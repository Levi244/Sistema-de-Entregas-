<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EntregaFácil</title>

  <style>
    body {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #1e3a8a;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1e40af;
    }

    .links {
      text-align: center;
      margin-top: 15px;
    }

    .links a {
      display: block;
      text-decoration: none;
      color: #2563eb;
      margin: 5px 0;
      font-size: 14px;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <form action="#">
    <input type="text" placeholder="Usuário" required>
    <input type="password" placeholder="Senha" required>

    <button type="submit">Entrar</button>
  </form>

  <div class="links">
    <a href="inicio.html">← Voltar</a>
    <a href="registro.php">Criar uma conta</a>
  </div>
</div>

</body>
</html>
